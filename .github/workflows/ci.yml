# Fast feedback on every push / PR: lint, types, unit tests, production build.
# Playwright against a live URL runs in e2e-preview.yml (Vercel preview deployment).
# Playwright with a local dev server runs on pushes to main only (see e2e-local job).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  # Green check on PRs so it is obvious browser E2E is covered elsewhere (not a failure).
  e2e-info-pull-request:
    name: E2E note (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Browser tests run on Vercel preview
        run: |
          echo "::notice::Playwright runs in workflow 'E2E (Vercel preview)' after the preview deployment succeeds."

  e2e-local:
    # PRs get browser tests against Vercel preview (e2e-preview.yml). Main keeps a local-server safety net.
    name: E2E (local dev server, main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [quality]
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (local dev server)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-main
          path: web/playwright-report/
