# Browser tests against a Vercel preview URL (manual only).
#
# Automatic runs on every preview deploy were disabled so PR checks are not blocked by
# Deployment Protection / bypass setup. Re-add `deployment_status` under `on:` when ready.
#
# Requires for protected previews: GitHub secret VERCEL_AUTOMATION_BYPASS_SECRET (same as
# Vercel → Deployment Protection → Protection Bypass for Automation).
#
# Run: Actions → "E2E (Vercel preview)" → Run workflow → paste preview base URL.
name: E2E (Vercel preview)

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: 'Base URL (https://your-app-xxx.vercel.app)'
        required: true
        type: string

concurrency:
  group: e2e-preview-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-vercel-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve preview base URL
        id: preview
        env:
          MANUAL_URL: ${{ github.event.inputs.preview_url }}
        run: |
          set -euo pipefail
          BASE="${MANUAL_URL}"
          if [ -z "${BASE}" ]; then
            echo "::error::No preview URL (workflow input preview_url is required)."
            exit 1
          fi
          # Normalize: no trailing slash (Playwright baseURL)
          BASE="${BASE%/}"
          echo "base_url=${BASE}" >> "${GITHUB_OUTPUT}"
          echo "Testing against ${BASE}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Detect deployment protection on preview
        id: protection
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.base_url }}
        run: |
          set -euo pipefail
          CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-redirs 0 "${PREVIEW_URL}/" || echo "000")
          CODE="${CODE//$'\r'/}"
          CODE="${CODE//$'\n'/}"
          echo "http_code=${CODE}" >> "${GITHUB_OUTPUT}"
          echo "Probe GET ${PREVIEW_URL}/ => HTTP ${CODE}"

      - name: Require bypass secret when preview returns 401 or 403
        if: |
          steps.protection.outputs.http_code == '401' ||
          steps.protection.outputs.http_code == '403'
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          if [ -z "${BYPASS}" ]; then
            echo "::error::Preview returns 401 (Vercel Deployment Protection). Add repository secret VERCEL_AUTOMATION_BYPASS_SECRET with the Protection Bypass for Automation value from Vercel (Project → Settings → Deployment Protection)."
            exit 1
          fi

      - name: Run Playwright against preview
        working-directory: web
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEB_SERVER: '1'
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.base_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-preview
          path: web/playwright-report/
