# Browser tests against the Vercel preview URL after a preview deployment succeeds.
#
# Requires: Vercel project linked to this repo with GitHub integration (Deployments API).
# Optional repo secret: VERCEL_AUTOMATION_BYPASS_SECRET — if "Deployment Protection" is on,
#   add the same value in Vercel → Project → Settings → Deployment Protection → Protection Bypass.
#
# Manual run: Actions → "E2E (Vercel preview)" → Run workflow → paste preview base URL.
name: E2E (Vercel preview)

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      preview_url:
        description: 'Base URL (https://your-app-xxx.vercel.app)'
        required: true
        type: string

concurrency:
  group: e2e-preview-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-vercel-preview:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment != 'production' &&
       github.event.deployment_status.environment != 'Production')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve preview base URL
        id: preview
        env:
          MANUAL_URL: ${{ github.event.inputs.preview_url }}
          ENV_URL: ${{ github.event.deployment_status.environment_url }}
          TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            BASE="${MANUAL_URL}"
          else
            BASE="${ENV_URL:-}"
            if [ -z "${BASE}" ]; then
              BASE="${TARGET_URL:-}"
            fi
          fi
          if [ -z "${BASE}" ]; then
            echo "::error::No preview URL on deployment_status (expected environment_url or target_url from Vercel)."
            exit 1
          fi
          # Normalize: no trailing slash (Playwright baseURL)
          BASE="${BASE%/}"
          echo "base_url=${BASE}" >> "${GITHUB_OUTPUT}"
          echo "Testing against ${BASE}"

      # For deployment_status, github.sha is the commit being deployed (GitHub docs).
      - name: Checkout tests at deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright against preview
        working-directory: web
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEB_SERVER: '1'
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.base_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-preview
          path: web/playwright-report/
