name: mahjong_learning_app
description: A comprehensive mobile learning platform for mahjong
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.9

  # Storage
  shared_preferences: ^2.2.2

  # SVG Rendering
  flutter_svg: ^2.0.9

  # HTTP
  http: ^1.1.2

  # Crash Reporting
  sentry_flutter: ^7.15.0

  # Sound Effects (add this)
  audioplayers: ^5.2.1

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  # Launcher Icons (add this)
  flutter_launcher_icons: ^0.13.1
  # Native Splash (add this)
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/tiles/
    - assets/sounds/
    - assets/icons/

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.ttf
